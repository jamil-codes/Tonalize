name: Deploy Redirect Page

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Create redirect page
        run: |
          mkdir public
          cat > public/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8">
            <meta http-equiv="refresh" content="0; url=https://tonalize.jamilcodes.com">
            <link rel="canonical" href="https://tonalize.jamilcodes.com">
            <script>
              window.location.replace("https://tonalize.jamilcodes.com");
            </script>
            <title>Redirecting...</title>
          </head>
          <body>
            <p>
              Redirecting to
              <a href="https://tonalize.jamilcodes.com">
                tonalize.jamilcodes.com
              </a>
            </p>
          </body>
          </html>
          EOF

      - name: Add .nojekyll
        run: touch public/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
